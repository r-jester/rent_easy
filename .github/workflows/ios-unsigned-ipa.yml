name: Build Flutter iOS IPA (unsigned for sideloading)

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate iOS project if missing
        run: |
          flutter config --enable-ios
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: Prepare iOS build files
        run: |
          flutter build ios --release --no-codesign || true

      - name: Install CocoaPods dependencies
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS directory was not generated"
            exit 1
          fi
          cd ios
          if [ ! -f "Podfile" ]; then
            echo "Podfile was not generated"
            exit 1
          fi
          pod install --repo-update

      - name: Build iOS app bundle
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Runner.app was not built"
            exit 1
          fi
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload rent_easy.ipa
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: rent_easy.ipa
          retention-days: 7
